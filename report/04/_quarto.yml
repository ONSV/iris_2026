language:
  section-title-appendices: "Apêndices"

book:
  title: "IRIS -- Indicadores Rodoviários Integrados de Segurança"
  subtitle: "Produto 04 -- Relatório Final"
  author: 
  - name: Pedro Augusto Borges dos Santos
  - name: Paloma Hellen Pereira Eleuterio
  - name: Dara de César Borszcz
  - name: Dr. Jorge Tiago Bastos
  date: 2025-01-09
