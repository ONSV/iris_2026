  # cover-image: logo/capa.png
  language: pt-BR
  # favicon: logo/onsv-fav.ico

bibliography: references.bib

# csl: apa

format:
  pdf:
    documentclass: report
    lang: pt-BR
    lof: true
    lot: true
    toc-depth: 4
    fig-dpi: 300
    fig-pos: "H"
    echo: false
    fontsize: 11pt
    linkcolor: "black"
    toccolor: "black"
    citecolor: "black"
    link-citations: true
    warning: false
    geometry: 
    - right=30mm
    - left=30mm
    - bottom=30mm
    - top=30mm
    papersize: a4
    cap-location: top
    # cite-method: biblatex
    csl: apa.csl
    include-in-header: 
      text: |
        \usepackage{lscape}
        \newcommand{\blandscape}{\begin{landscape}}
        \newcommand{\elandscape}{\end{landscape}}
        \usepackage[x11names]{xcolor}
        \usepackage{sectsty}

        \definecolor{onsvblue}{HTML}{00496D}

        \chapterfont{\color{onsvblue}}    
        \sectionfont{\color{onsvblue}}     
        \subsectionfont{\color{onsvblue}}
        \subsubsectionfont{\color{onsvblue}}
  docx:
    number-sections: true
    warning: false
    echo: false
    toc: true
    lang: pt-BR
    fig-dpi: 300
    papersize: a4
    cap-location: top